---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: kafka-topic-server
  labels:
    purpose: kafka-topic-server
    role: kafka
  namespace: dev
spec:
  selector:
    matchLabels:
      role: kafka
      purpose: kafka-topic-server
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: kafka-topic-server
        role: kafka
    spec:
      hostname: kafka-topic-server
      terminationGracePeriodSeconds: 5
      containers:
        - image: localhost:32000/kafka-topic-server:0.1
          imagePullPolicy: Always
          name: kafka-topic-server
          ports:
            - containerPort: 9092
            - containerPort: 2181
      # nodeSelector:
      #   kubernetes.io/hostname: rrt-general-services
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - rrt-general-services
                    - debugger

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-writer-consumer-0
  labels:
    purpose: data-writer-consumer
    role: data-writer-consumer-0
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: data-writer-consumer
      role: data-writer-consumer-0
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        purpose: data-writer-consumer
        role: data-writer-consumer-0
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: localhost:32000/operator:1.0
          imagePullPolicy: Always
          name: data-writer-consumer-0-container
          env:
            - {name: ROLE, value: data-writer-consumer}
            - {name: TOPIC, value:  result}
            - {name: TRUSTSTORE_PATH, value: /root/mandelbrot-generator/test.ts}
            - {name: KEYSTORE_PATH, value: /root/mandelbrot-generator/test.ks}
          ports:
            - containerPort: 9091
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - rrt-general-services
                    - debugger
