version: 2

topicPrefix: test
# specifies how the work will be subdivided by nodes allocated to topics test-i where
# i represents the maximum number of topics
partitions: 16

iterations: 1000
coordinate: 0.1982-1.1003i
zoomPc: 100
neighbourhoodSize: 100

monitor:
  prometheus_api_url: http://blowdryer:30845/api/v1/query_range
  queries:
    - id: dwell_time
      query: "sum by (instance) (rate(node_cpu_seconds_total{group='consumers',mode='idle'}[4m]))"
  registered_consumer_name_template: consumer-%d:9090

# Optimisation strategy (end-game hypothesis testing)
policy:
  # Use the none policy to send work to allocated nodes
  none:
    active: true
    block_size: 160