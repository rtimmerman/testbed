version: 2
topicPrefix: test
iterations: 1000
coordinate: 0+0i
#coordinate: 0.1982-1.1003i
zoomPc: 100
neighbourhoodSize: 100

monitor:
  prometheus_api_url: http://rrt-general-services:31697/api/v1/query_range
  queries:
    - id: dwell_time
      query: "sum by (instance) (rate(node_cpu_seconds_total{group='consumers',mode='idle'}[4m]))"
  registered_consumer_name_template: consumer-%d:9091

# Optimisation strategy (end-game hypothesis testing)
policy:
  # Use the stable region policy to zero in on a stable region of the set (where dimensionality is close 1.0 across all nodes)
  # this objective of this process is to ascertain performance differences between nodes as stability is approached
  # Pre-reqs a stable point in the z-plane should be specified (above)
  # policies: stableRegionPolicy, unstableRegionPolicy, towardsPolicy
  stable_region_policy:
    # Max tries designates the number of attempts to make before arriving in the situation where all nodes are stable
    max_tries: 10
    # The time between each try
    # try_interval_sec: 7_200 # 2 hours
    # try_interval_sec: 1_800 # 30 minutes
    try_interval_sec: 180 # 3 minutes