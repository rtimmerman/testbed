# This file has been generated dynamically using generate-mongo-config-server-yml.pl, edit that file and re-run.
kind: Namespace
apiVersion: v1
metadata:
  name: dev
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: config-server-1
  namespace: dev
  labels:
    purpose: database
spec:
  replicas: 1
  selector:
    matchLabels:
      role:  config-server-1
      purpose: database
  template:
    metadata:
      labels:
        role: config-server-1
        purpose: database
    spec:
      containers:
        - name: config-server-1-pod
          image: localhost:32000/mongo-cst:1.0
          imagePullPolicy: Always
          command:
            - 'sh'
            - '-c'
            - '/kickstart/mongod-launcher.sh'
          volumeMounts:
            - name: kickstart-dir
              mountPath: /kickstart/
      volumes:
        - name: kickstart-dir
          configMap:
            name: rs-config
            defaultMode: 0777
      # nodeSelector:
      #   role: general-services
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger

---
kind: Service
apiVersion: v1
metadata:
  name: config-server-svc-1
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
      role: config-server-1
      purpose: database
  ports:
    - port: 27019
      targetPort: 27019
  type: ClusterIP
---
