kind: Namespace
apiVersion: v1
metadata:
  name: dev
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: config-server-1
  namespace: dev
  labels:
    purpose: database
spec:
  replicas: 1
  selector:
    matchLabels:
      role:  config-server-1
      purpose: database
  template:
    metadata:
      labels:
        role: config-server-1
        purpose: database
    spec:
      containers:
        - name: config-server-1-pod
          image: localhost:32000/mongo-cst:1.0
          imagePullPolicy: Always
          command:
            - 'sh'
            - '-c'
            - '/kickstart/mongod-launcher.sh'
          volumeMounts:
            - name: kickstart-dir
              mountPath: /kickstart/
      volumes:
        - name: kickstart-dir
          configMap:
            name: rs-config
            defaultMode: 0777
      # nodeSelector:
      #   role: general-services
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger

---
kind: Service
apiVersion: v1
metadata:
  name: config-server-svc-1
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
      role: config-server-1
      purpose: database
  ports:
    - port: 27019
      targetPort: 27019
  type: ClusterIP
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: config-server-2
  namespace: dev
  labels:
    purpose: database
spec:
  replicas: 1
  selector:
    matchLabels:
      role:  config-server-2
  template:
    metadata:
      labels:
        role: config-server-2
    spec:
      containers:
        - name: config-server-2-pod
          image: localhost:32000/mongo-cst:1.0
          imagePullPolicy: Always
          command:
            - 'mongod'
            - '--configsvr'
            - '--replSet'
            - 'configServerRS'
            - '--sslMode'
            - 'requireSSL'
            - '--clusterAuthMode'
            - 'x509'
            - '--sslClusterFile'
            - '/kickstart/config-server.pem'
            - '--sslPEMKeyFile'
            - '/kickstart/config-server-2.pem'
            - '--sslCAFile'
            - '/kickstart/root-ca.pem'
            - '--sslAllowInvalidCertificates'
            - '--bind_ip'
            - '*'
            # - '--dbpath'
          volumeMounts:
            - name: kickstart-dir
              mountPath: /kickstart/
      volumes:
        - name: kickstart-dir
          configMap:
            name: rs-config
            defaultMode: 0777
          # - '/var/lib/mongod'
          #      nodeSelector:
          #cloud.google.com/gke-nodepool: default-pool
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger
      # nodeSelector:
      # role: general-services

---
kind: Service
apiVersion: v1
metadata:
  name: config-server-svc-2
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
      role: config-server-2
  ports:
    - port: 27019
      targetPort: 27019
  type: ClusterIP
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: config-server-3
  namespace: dev
  labels:
    purpose: database
spec:
  replicas: 1
  selector:
    matchLabels:
      role:  config-server-3
  template:
    metadata:
      labels:
        role: config-server-3
    spec:
      containers:
        - name: config-server-3-pod
          image: localhost:32000/mongo-cst:1.0
          imagePullPolicy: Always
          command:
            #- 'sh'
            #- '-c'
            #- '/kickstart/mongod-launcher.sh'
            - 'mongod'
            - '--configsvr'
            - '--replSet'
            - 'configServerRS'
            - '--sslMode'
            - 'requireSSL'
            - '--clusterAuthMode'
            - 'x509'
            - '--sslClusterFile'
            - '/kickstart/config-server.pem'
            - '--sslPEMKeyFile'
            - '/kickstart/config-server-3.pem'
            - '--sslCAFile'
            - '/kickstart/root-ca.pem'
            - '--sslAllowInvalidCertificates'
            - '--bind_ip'
            - '*'
            #- '--dbpath'
            #- '/var/lib/mongod'
          volumeMounts:
            - name: kickstart-dir
              mountPath: /kickstart/
      volumes:
        - name: kickstart-dir
          configMap:
            name: rs-config
            defaultMode: 0777
            #     nodeSelector:
            #cloud.google.com/gke-nodepool: default-pool
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger

---
kind: Service
apiVersion: v1
metadata:
  name: config-server-svc-3
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
      role: config-server-3
  ports:
    - port: 27019
      targetPort: 27019
  type: ClusterIP
---
kind: PersistentVolume
apiVersion: v1
metadata:
  name: kickstart-dir
  namespace: dev
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  gcePersistentDisk:
    pdName: 'kickstart-disk'
    fsType: ext4
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: kickstart-dir-claim
  namespace: dev
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ''
  resources:
    requests:
        storage: 10Gi
--- 
kind: ConfigMap
apiVersion: v1
metadata:
  name: rs-config
  namespace: dev
data:
  mongod-launcher.sh: |
    mongod --bind_ip_all &
    #mongo --norc --nodb --tls --tlsCertificateKeyFile /kickstart/config-server.pem --tlsCAFile /kickstart/root-ca.pem /kickstart/add-user.js
    mongosh --norc /kickstart/add-user.js
    killall mongod
    mongod --configsvr \
    --replSet configServerRS \
    --sslMode requireSSL \
    --clusterAuthMode x509 \
    --sslClusterFile /kickstart/config-server.pem \
    --sslPEMKeyFile /kickstart/config-server.pem \
    --sslCAFile /kickstart/root-ca.pem \
    --sslAllowInvalidCertificates \
    --bind_ip \*
  add-user.js: |
    // wait for mongod to be present...
    var conn;

    while(true) {
      try {
        conn = new Mongo('localhost:27017');
        break;
      } catch (Error) {
        print(Error);
      }
      sleep(100);
    }

    //conn.setReadPref('primary');

    db = conn.getDB('admin').getSiblingDB('$external');
    outcome = db.runCommand(
      {
        createUser: "CN=config-server-svc-1,OU=ExperimentClients,O=Roderick,O=BBK,L=Southminster,ST=Essex,C=GB",
        roles: [
          {role: 'userAdminAnyDatabase', db: 'admin'},
          {role: 'readWrite', db: 'test'},
          {role: 'clusterAdmin', db: 'admin'}
        ],
        writeConcern: {
          w: 'majority',
          wtimeout: 5000
        }
      }
    );
    printjson(outcome);

    outcome = db.runCommand(
      {
        createUser: "CN=mongos-1-svc,OU=ExperimentServers,O=Roderick,O=BBK,L=Southminster,ST=Essex,C=GB",
        roles: [
          {role: 'readWrite', db: 'config'},
        ],
        writeConcern: {
          w: 'majority',
          wtimeout: 5000
        }
      }
    );

    printjson(outcome);
  shard-configdb.js: |
    result = rs.initiate({
      _id: "configServerRS",
      configsvr: true,
      members: [
          { _id: 0, host: "config-server-svc-1:27019", priority: 2 },
          { _id: 1, host: "config-server-svc-2:27019", priority: 1 },
          { _id: 2, host: "config-server-svc-3:27019", priority: 1 }
      ]
    });

    printjson(result);
  waitscript.pl: |
    use Socket;

    $| = 1;

    socket(SOCKET1, PF_INET, SOCK_STREAM, (getprotobyname('tcp'))[2]);
    socket(SOCKET2, PF_INET, SOCK_STREAM, (getprotobyname('tcp'))[2]);
    socket(SOCKET3, PF_INET, SOCK_STREAM, (getprotobyname('tcp'))[2]);

    $waiting = 1;
    while ($waiting) {
      sleep 1;
      print "Attempting to connect...\n";
      
      (
        connect(SOCKET1, pack_sockaddr_in(27019, inet_aton("config-server-svc-1")))
        and connect(SOCKET2, pack_sockaddr_in(27019, inet_aton("config-server-svc-2")))
        and connect(SOCKET3, pack_sockaddr_in(27019, inet_aton("config-server-svc-3")))
      ) or next;

      $waiting = 0;
    }

    close(SOCKET1);
    close(SOCKET2);
    close(SOCKET3);

    printf "Connected!\n";

    print `mongosh --tls --sslPEMKeyFile /kickstart/config-server.pem --sslCAFile /kickstart/root-ca.pem --host config-server-svc-1 --authenticationDatabase '$external' --authenticationMechanism MONGODB-X509 --port 27019 /kickstart/shard-configdb.js `;

    exit(0);
