kind: Pod
apiVersion: v1
metadata:
  name: configurator-pod
  namespace: dev
spec:
  containers:
    - name: configurator-container
      image: mongo
      command: ['/usr/bin/perl', '/kickstart/waitscript.pl']
      volumeMounts:
        - name: kickstart-dir
          mountPath: /kickstart/
  volumes:
    - name: kickstart-dir
      configMap:
        name: rs-config
    # - name: scripts-dir
    #   persistentVolumeClaim:
    #     claimName: scripts-dir-claim
  restartPolicy: Never
  #nodeSelector:
  #cloud.google.com/gke-nodepool: default-pool
