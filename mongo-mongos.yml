---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: mongos-1
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      role:  mongos-1
  template:
    metadata:
      labels:
        role: mongos-1
    spec:
      containers:
        - name: mongos-1-pod
          image: mongo
          command:
            - 'bin/sh'
            - '/kickstart/start.sh'
          volumeMounts:
            - name: kickstart-dir
              mountPath: /kickstart/
      volumes:
        - name: kickstart-dir
          configMap:
            name: startup-config
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
---
kind: Service
apiVersion: v1
metadata:
  name: mongos-1-svc
  namespace: dev
spec:
  selector:
    role: mongos-1
  ports:
    - port: 27017
      targetPort: 27017
  type: LoadBalancer
