---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: mongos-1
  namespace: dev
  labels:
    purpose: database
spec:
  replicas: 1
  selector:
    matchLabels:
      role:  mongos
      purpose: database
  template:
    metadata:
      labels:
        role: mongos
        purpose: database
    spec:
      containers:
        - name: mongos-1-pod
          image: localhost:32000/mongo-cst:1.0
          imagePullPolicy: Always
          command:
            - 'bin/sh'
            - '/kickstart/start.sh'
          volumeMounts:
            - name: kickstart-dir
              mountPath: /kickstart/
      volumes:
        - name: kickstart-dir
          configMap:
            name: startup-config
      # nodeSelector:
        # kubernetes.io/hostname: rrt-general-services
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger

        

---
kind: Service
apiVersion: v1
metadata:
  name: mongos-1-svc
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: mongos
  ports:
    - port: 27017
      targetPort: 27017
  type: LoadBalancer
