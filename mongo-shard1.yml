---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arnold-pri
  labels:
    role: arnold-pri
    purpose: database
  namespace: dev
spec:
  selector:
    matchLabels:
      role: arnold-pri
      purpose: database
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          role: arnold-pri
          purpose: database
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-arnold
          - name: kickstart-arnold
            configMap:
              name: kickstart-arnold
              defaultMode: 0777
            #persistentVolumeClaim:
            #  claimName: filestore 
        containers:
          - image: localhost:32000/mongo-cst:1.0
            imagePullPolicy: Always
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-arnold
                mountPath: /kickstart/
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - mongo-shard-1
                      - debugger


