---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arnold-pri
  labels:
    purpose: arnold-pri
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: arnold-pri
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          purpose: arnold-pri
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-arnold
          - name: kickstart-arnold
            configMap:
              name: kickstart-arnold
              defaultMode: 0777
          - name: filestore
            hostPath:
              path: /home/roderick/experiment-data
              type: Directory

            #persistentVolumeClaim:
            #  claimName: filestore 
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-arnold
                mountPath: /kickstart/
              - name: filestore
                mountPath: /filestore/
        nodeSelector:
          kubernetes.io/hostname: mongo-shard-1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arnold-sec-1
  labels:
    purpose: arnold-sec-1
  namespace: dev  
spec:
  selector:
    matchLabels:
      purpose: arnold-sec-1
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: arnold-sec-1
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-1.sh"
          volumeMounts:
            - name: kickstart-arnold
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-arnold
          configMap:
            name: kickstart-arnold
            defaultMode: 0777
        - name: filestore
          hostPath:
           path: /home/roderick/experiment-data
      nodeSelector:
        kubernetes.io/hostname: mongo-shard-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arnold-sec-2
  labels:
    purpose: arnold-sec-2
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: arnold-sec-2
  replicas: 1
  strategy:
