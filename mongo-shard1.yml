    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-2.sh"
          volumeMounts:
            - name: kickstart-arnold
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-arnold
          configMap:
            name: kickstart-arnold
            defaultMode: 0777
        - name: filestore
