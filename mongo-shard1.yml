kind: Pod
apiVersion: v1
metadata:
  name: arnold-configurator-pod
  namespace: dev
spec:
  containers:
    - name: arnold-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-arnold
          mountPath: /kickstart/
        - name: kickstart-shard-arnold
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-arnold
      configMap:
        name: kickstart-arnold
        defaultMode: 0777
    - name: kickstart-shard-arnold
      configMap:
        name: add-shard-arnold
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-1
                - debugger
                - monolith

