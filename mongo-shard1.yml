          volumeMounts:
            - name: kickstart-arnold
              mountPath: /kickstart/
      volumes:
        - name: kickstart-arnold
          configMap:
            name: kickstart-arnold
            defaultMode: 0777

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger

