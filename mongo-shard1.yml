apiVersion: apps/v1
kind: Deployment
metadata:
  name: fileserver
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      role: fileserver
  template:
    metadata:
      labels:
        role: fileserver
    spec:
      containers:
        - name: nfs-server
          image: gcr.io/google_containers/volume-nfs:0.8
          ports:
            - name: nfs
              containerPort: 2049
            - name: mountd
              containerPort: 20048
            - name: rpcbind
              containerPort: 111
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /exports
              name: export-volume
      volumes:
        - name: export-volume
          gcePersistentDisk:
            pdName: datastore
            fsType: ext4
---
apiVersion: v1
kind: Service
metadata:
  name: fileserver
  namespace: dev
spec:
  ports:
    - name: nfs
      port: 2049
    - name: mountd
      port: 20048
    - name: rpcbind
      port: 111
  selector:
    role: fileserver
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs
  namespace: dev
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: fileserver.dev.svc.cluster.local
    path: "/"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filestore
  namespace: dev
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-rs-config
  namespace: dev
data:
  mongo-rs-config.js: |
    while (true) {
      sleep(1000);
      var result = rs.initiate({
        _id: "rs0",
        members: [
          {_id: 0, host: "arnold-pri:27018", priority: 2},
          {_id: 1, host: "arnold-sec-1:27018", priority: 1},
          {_id: 2, host: "arnold-sec-2:27018", priority: 1}
        ]
      });
      printjson(result);

      if (result.ok == 1) {
        break;
      }
    }

  mongo-replication.yml: |
    sharding:
      clusterRole:  shardsvr
    replication:
      replSetName: "rs0"
    net:
      bindIp: "*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: add-shard
  namespace: dev
data:
  add-shard.js: |
    var ok = false;

    while(!ok) {
      sleep(10000);
      var error = sh.addShard(
        "rs0/arnold-pri:27018,arnold-sec-1:27018,arnold-sec-2:27018"
      );

      ok = (error.ok == 1);

      printjson(error);
    }

    print("installing cartToPol fn");

    var out = db.system.js.save({
      _id: 'cartToPol',
      value: function (x, y, width, height) {
          return {
              re: -2 + ((x / width) * 4),
              im: -2 + ((y / height) * 4)
          };
      }
    });

    printjson(out);

    print("installing mandelbrot fn");

    var out = db.system.js.save({
      _id: 'mandelbrot',
      value: function (z, c, iterations) {
          if (iterations == 0) {
              return -1;
          }

          var M = {
              re: ((z.re * z.re) - (z.im * z.im)) + c.re,
              im: (2 * (z.im * z.re)) + c.im
          }

          var M_abs = Math.sqrt((M.re * M.re) + (M.im * M.im));

          if (M_abs > 4.0) {
              return iterations;
          }

          return mandelbrot(M, c, iterations - 1);
      }
    });

    printjson(out);
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apt-config
  namespace: dev
data:
  app-support-pri.sh: |
    apt update
    apt install -y netcat python3 python3-pip
    pip3 install psutil
    mongod --config=/config/mongo-replication.yml --bind_ip_all &
    for i in {1..60}; do
       sleep 1
       echo 'waiting for arnold-pri:27018 ...'
       if `nc -z arnold-pri 27018`; then
        echo 'setting up mongo rs via arnold-pri ...'
        mongo --host arnold-pri:27018 /config/mongo-rs-config.js
        echo 'mongo rs configured!'
        break
      fi 
    done
    #python3 /filestore/monitor.py
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  app-support-sec.sh: |
    apt update
    apt install -y netcat python3 python3-pip
    pip3 install psutil
    mongod --shardsvr --replSet rs0 --bind_ip_all &
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  configurator.sh: |
    apt update
    apt install -y netcat
    for i in {1..60}; do
      sleep 1
      if nc -z mongos-1-svc 27017; then
        echo 'Establishing shards'
        mongo mongos-1-svc:27017/admin /scripts/add-shard.js
        break
      fi
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arnold-pri
  labels:
    purpose: arnold-pri
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: arnold-pri
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          purpose: arnold-pri
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config
          - name: apt-config
            configMap:
              name: apt-config
              defaultMode: 0777
          - name: filestore
            persistentVolumeClaim:
              claimName: filestore 
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/apt-config/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: apt-config
                mountPath: /apt-config/
              - name: filestore
                mountPath: /filestore/
---
