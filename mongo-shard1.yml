apiVersion: v1
kind: Service
metadata:
  name: arnold-pri
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: arnold-pri
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: arnold-sec-1
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: arnold-sec-1
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: arnold-sec-2
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: arnold-sec-2
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: arnold-configurator-pod
  namespace: dev
spec:
  containers:
    - name: arnold-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-arnold
          mountPath: /kickstart/
        - name: kickstart-shard-arnold
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-arnold
      configMap:
        name: kickstart-arnold
        defaultMode: 0777
    - name: kickstart-shard-arnold
      configMap:
        name: add-shard-arnold
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-1
                - debugger
