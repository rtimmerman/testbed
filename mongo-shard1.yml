---
apiVersion: v1
kind: Service
metadata:
  name: arnold-pri
  namespace: dev
spec:
  selector:
    purpose: arnold-pri
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: arnold-sec-1
  namespace: dev
spec:
  selector:
    purpose: arnold-sec-1
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: arnold-sec-2
  namespace: dev
spec:
  selector:
    purpose: arnold-sec-2
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: arnold-configurator-pod
  namespace: dev
spec:
  containers:
    - name: arnold-configurator-container
      image: mongo
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-arnold
          mountPath: /kickstart/
        - name: kickstart-shard-arnold
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-arnold
      configMap:
        name: kickstart-arnold
        defaultMode: 0777
    - name: kickstart-shard-arnold
      configMap:
        name: add-shard-arnold
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: mongo-shard-1

