  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: bairstow-pri
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
