apiVersion: v1
kind: Service
metadata:
  name: bairstow-pri
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: bairstow-pri
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bairstow-sec-1
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: bairstow-sec-1
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bairstow-sec-2
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: bairstow-sec-2
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: bairstow-configurator-pod
  namespace: dev
spec:
  containers:
    - name: bairstow-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-bairstow
          mountPath: /kickstart/
        - name: kickstart-shard-bairstow
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-bairstow
      configMap:
        name: kickstart-bairstow
        defaultMode: 0777
    - name: kickstart-shard-bairstow
      configMap:
        name: add-shard-bairstow
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-1
                - debugger
