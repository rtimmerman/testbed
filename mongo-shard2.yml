        role: bairstow-sec-1
        purpose: database
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: localhost:32000/mongo-cst:1.0
          imagePullPolicy: Always
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-1.sh"
          volumeMounts:
            - name: kickstart-bairstow
              mountPath: /kickstart/
            # - name: filestore
              # mountPath: /filestore/
      volumes:
        - name: kickstart-bairstow
          configMap:
            name: kickstart-bairstow
            defaultMode: 0777
        # - name: filestore
          # hostPath:
          #  path: /home/roderick/experiment-data
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger


