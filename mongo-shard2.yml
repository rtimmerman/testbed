---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bairstow-pri
  labels:
    purpose: bairstow-pri
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: bairstow-pri
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          purpose: bairstow-pri
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-bairstow
          - name: kickstart-bairstow
            configMap:
              name: kickstart-bairstow
              defaultMode: 0777
          - name: filestore
            hostPath:
              path: /home/roderick/experiment-data
              type: Directory
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-bairstow
                mountPath: /kickstart/
              - name: filestore
                mountPath: /filestore/
        nodeSelector:
          kubernetes.io/hostname: mongo-shard-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bairstow-sec-1
  labels:
    purpose: bairstow-sec-1
  namespace: dev  
spec:
  selector:
    matchLabels:
      purpose: bairstow-sec-1
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: bairstow-sec-1
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-1.sh"
          volumeMounts:
            - name: kickstart-bairstow
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-bairstow
          configMap:
            name: kickstart-bairstow
            defaultMode: 0777
        - name: filestore
          hostPath:
            path: /home/roderick/experiment-data
            type: Directory
      nodeSelector:
        kubernetes.io/hostname: mongo-shard-2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bairstow-sec-2
  labels:
    purpose: bairstow-sec-2
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: bairstow-sec-2
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: bairstow-sec-2
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-2.sh"
          volumeMounts:
            - name: kickstart-bairstow
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-bairstow
          configMap:
            name: kickstart-bairstow
            defaultMode: 0777
        - name: filestore
          hostPath:
            path: /home/roderick/experiment-data
            type: Directory
      nodeSelector:
        kubernetes.io/hostname: mongo-shard-2
---
apiVersion: v1
kind: Service
metadata:
  name: bairstow-pri
  namespace: dev
spec:
  selector:
    purpose: bairstow-pri
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bairstow-sec-1
  namespace: dev
spec:
  selector:
    purpose: bairstow-sec-1
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bairstow-sec-2
  namespace: dev
spec:
  selector:
    purpose: bairstow-sec-2
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: bairstow-configurator-pod
  namespace: dev
spec:
  containers:
    - name: bairstow-configurator-container
      image: mongo
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-bairstow
          mountPath: /kickstart/
        - name: kickstart-shard-bairstow
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-bairstow
      configMap:
        name: kickstart-bairstow
        defaultMode: 0777
    - name: kickstart-shard-bairstow
      configMap:
        name: add-shard-bairstow
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: mongo-shard-2
