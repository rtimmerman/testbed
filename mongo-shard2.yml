apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-rs-config-bairstow
  namespace: dev
data:
  mongo-rs-config-bairstow.js: |
    while (true) {
      sleep(1000);
      var result = rs.initiate({
        _id: "bairstow.rs",
        members: [
          {_id: 0, host: "bairstow-pri:27018", priority: 2},
          {_id: 1, host: "bairstow-sec-1:27018", priority: 1},
          {_id: 2, host: "bairstow-sec-2:27018", priority: 1}
        ]
      });
      printjson(result);

      if (result.ok == 1) {
        break;
      }
    }

  mongo-replication-bairstow.yml: |
    sharding:
      clusterRole:  shardsvr
    replication:
      replSetName: "bairstow.rs"
    net:
      bindIp: "*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: add-shard-bairstow
  namespace: dev
data:
  add-shard-bairstow.js: |
    var ok = false;

    while(!ok) {
      sleep(10000);
      var error = sh.addShard(
        "bairstow.rs/bairstow-pri:27018,bairstow-sec-1:27018,bairstow-sec-2:27018"
      );

      ok = (error.ok == 1);

      printjson(error);
    }

    print("installing cartToPol fn");

      var out = db.system.js.save({
        _id: 'cartToPol',
        value: function (x, y, width, height) {
            return {
                re: -2 + ((x / width) * 4),
                im: -2 + ((y / height) * 4)
            };
        }
      });

    printjson(out);

    print("installing mandelbrot fn");

    var out = db.system.js.save({
      _id: 'mandelbrot',
      value: function (z, c, iterations) {
          if (iterations == 0) {
              return -1;
          }

          var M = {
              re: ((z.re * z.re) - (z.im * z.im)) + c.re,
              im: (2 * (z.im * z.re)) + c.im
          }

          var M_abs = Math.sqrt((M.re * M.re) + (M.im * M.im));

          if (M_abs > 4.0) {
              return iterations;
          }

          return mandelbrot(M, c, iterations - 1);
      }
    });

    printjson(out);
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apt-config-bairstow
  namespace: dev
data:
  app-support-pri.sh: |
    apt update
    apt install -y netcat python3 python3-pip
    pip3 install psutil
    mkdir -p /filestore/data/bairstow-pri
    mongod --config /config/mongo-replication-bairstow.yml --bind_ip_all --dbpath /filestore/data/bairstow-pri &
    for i in {1..60}; do
       sleep 10
       echo 'waiting for bairstow-pri:27018 ...'
       if `nc -z bairstow-pri 27018`; then
        echo 'setting up mongo rs via bairstow-pri ...'
        mongo --host bairstow-pri:27018 /config/mongo-rs-config-bairstow.js
        echo 'mongo rs configured!'
        break
      fi 
    done
    #python3 /filestore/monitor.py
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  app-support-sec-1.sh: |
    apt update
    apt install -y netcat python3 python3-pip
    pip3 install psutil
    mkdir -p /filestore/data/bairstow-sec-1
    mongod --shardsvr --replSet bairstow.rs --bind_ip_all --dbpath /filestore/data/bairstow-sec-1 &
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  app-support-sec-2.sh: |
    apt update
    apt install -y netcat python3 python3-pip
    pip3 install psutil
    mkdir -p /filestore/data/bairstow-sec-2
    mongod --shardsvr --replSet bairstow.rs --bind_ip_all --dbpath /filestore/data/bairstow-sec-2 &
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  configurator.sh: |
    apt update
    apt install -y netcat
    for i in {1..60}; do
      sleep 1
      if nc -z mongos-1-svc 27017; then
        echo 'Establishing shards'
        mongo mongos-1-svc:27017/admin /scripts/add-shard-bairstow.js
        break
      fi
    done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bairstow-pri
  labels:
    purpose: bairstow-pri
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: bairstow-pri
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          purpose: bairstow-pri
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-bairstow
          - name: apt-config-bairstow
            configMap:
              name: apt-config-bairstow
              defaultMode: 0777
          - name: filestore
            persistentVolumeClaim:
              claimName: filestore 
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/apt-config/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: apt-config-bairstow
                mountPath: /apt-config/
              - name: filestore
                mountPath: /filestore/
---
