          volumeMounts:
            - name: kickstart-bairstow
              mountPath: /kickstart/
            # - name: filestore
              # mountPath: /filestore/
      volumes:
        - name: kickstart-bairstow
          configMap:
            name: kickstart-bairstow
            defaultMode: 0777
        # - name: filestore
          # hostPath:
          #  path: /home/roderick/experiment-data
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
                    - mongo-shard-1
                    - debugger


