kind: Pod
apiVersion: v1
metadata:
  name: bairstow-configurator-pod
  namespace: dev
spec:
  containers:
    - name: bairstow-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-bairstow
          mountPath: /kickstart/
        - name: kickstart-shard-bairstow
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-bairstow
      configMap:
        name: kickstart-bairstow
        defaultMode: 0777
    - name: kickstart-shard-bairstow
      configMap:
        name: add-shard-bairstow
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-2
                - debugger
