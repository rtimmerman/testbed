apiVersion: v1
kind: Service
metadata:
  name: bairstow-sec-1
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: bairstow-sec-1
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: bairstow-sec-2
  namespace: dev
  labels:
    purpose: database
spec:
  selector:
    role: bairstow-sec-2
