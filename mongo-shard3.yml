  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: calvin-configurator-pod
  namespace: dev
spec:
  containers:
    - name: calvin-configurator-container
      image: mongo
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-calvin
          mountPath: /kickstart/
        - name: kickstart-shard-calvin
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-calvin
      configMap:
        name: kickstart-calvin
        defaultMode: 0777
    - name: kickstart-shard-calvin
      configMap:
        name: add-shard-calvin
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: rrt-mongo-shard-3
