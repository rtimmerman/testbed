---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calvin-pri
  labels:
    role: calvin-pri
    purpose: database
  namespace: dev
spec:
  selector:
    matchLabels:
      role: calvin-pri
      purpose: database
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          role: calvin-pri
          purpose: database
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-calvin
          - name: kickstart-calvin
            configMap:
              name: kickstart-calvin
              defaultMode: 0777
          - name: filestore
            hostPath:
              path: /home/roderick/experiment-data
              type: Directory
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-calvin
                mountPath: /kickstart/
              - name: filestore
                mountPath: /filestore/
        nodeSelector:
          kubernetes.io/hostname: rrt-mongo-shard-3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calvin-sec-1
  labels:
    role: calvin-sec-1
