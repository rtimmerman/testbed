              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-calvin
          configMap:
            name: kickstart-calvin
            defaultMode: 0777
        - name: filestore
          hostPath:
            path: /home/roderick/experiment-data
            type: Directory
      nodeSelector:
        kubernetes.io/hostname: rrt-mongo-shard-3
