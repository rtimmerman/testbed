            name: kickstart-calvin
            defaultMode: 0777
        # - name: filestore
          # hostPath:
          #  path: /home/roderick/experiment-data
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: role
                  operator: In
                  values:
