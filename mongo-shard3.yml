---
kind: Pod
apiVersion: v1
metadata:
  name: calvin-configurator-pod
  namespace: dev
spec:
  containers:
    - name: calvin-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-calvin
          mountPath: /kickstart/
        - name: kickstart-shard-calvin
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-calvin
      configMap:
        name: kickstart-calvin
        defaultMode: 0777
    - name: kickstart-shard-calvin
      configMap:
        name: add-shard-calvin
  restartPolicy: Never
  affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
              - key: role
                operator: In
                values:
                  - mongo-shard-3
                  - debugger
