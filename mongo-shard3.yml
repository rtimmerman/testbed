---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calvin-pri
  labels:
    purpose: calvin-pri
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: calvin-pri
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          purpose: calvin-pri
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-calvin
          - name: kickstart-calvin
            configMap:
              name: kickstart-calvin
              defaultMode: 0777
          - name: filestore
            persistentVolumeClaim:
              claimName: filestore 
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-calvin
                mountPath: /kickstart/
              - name: filestore
                mountPath: /filestore/
        nodeSelector:
          cloud.google.com/gke-nodepool: default-pool
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calvin-sec-1
  labels:
    purpose: calvin-sec-1
  namespace: dev  
spec:
  selector:
    matchLabels:
      purpose: calvin-sec-1
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: calvin-sec-1
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-1.sh"
          volumeMounts:
            - name: kickstart-calvin
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-calvin
          configMap:
            name: kickstart-calvin
            defaultMode: 0777
        - name: filestore
          persistentVolumeClaim:
            claimName: filestore
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calvin-sec-2
  labels:
    purpose: calvin-sec-2
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: calvin-sec-2
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: calvin-sec-2
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-2.sh"
          volumeMounts:
            - name: kickstart-calvin
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-calvin
          configMap:
            name: kickstart-calvin
            defaultMode: 0777
        - name: filestore
          persistentVolumeClaim:
            claimName: filestore
      nodeSelector:
        cloud.google.com/gke-nodepool: default-pool
---
apiVersion: v1
kind: Service
metadata:
  name: calvin-pri
  namespace: dev
spec:
  selector:
    purpose: calvin-pri
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: calvin-sec-1
  namespace: dev
spec:
  selector:
    purpose: calvin-sec-1
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: calvin-sec-2
  namespace: dev
spec:
  selector:
    purpose: calvin-sec-2
  ports:
    - name: mongo
      port: 27018
      targetPort: 27018
    - name: node-exporter
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: calvin-configurator-pod
  namespace: dev
spec:
  containers:
    - name: calvin-configurator-container
      image: mongo
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-calvin
          mountPath: /kickstart/
        - name: kickstart-shard-calvin
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-calvin
      configMap:
        name: kickstart-calvin
        defaultMode: 0777
    - name: kickstart-shard-calvin
      configMap:
        name: add-shard-calvin
  restartPolicy: Never
  nodeSelector:
    cloud.google.com/gke-nodepool: default-pool
