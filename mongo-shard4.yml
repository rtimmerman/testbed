          volumeMounts:
            - name: kickstart-duncan
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-duncan
          configMap:
            name: kickstart-duncan
            defaultMode: 0777
        - name: filestore
          hostPath:
            path: /home/roderick/experiment-data
            type: Directory
      nodeSelector:
        kubernetes.io/hostname: mongo-shard-4
