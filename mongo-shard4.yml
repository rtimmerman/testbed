---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duncan-pri
  labels:
    role: duncan-pri
    purpose: database
  namespace: dev
spec:
  selector:
    matchLabels:
      role: duncan-pri
      purpose: database
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          role: duncan-pri
          purpose: database
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-duncan
          - name: kickstart-duncan
            configMap:
              name: kickstart-duncan
              defaultMode: 0777
            #persistentVolumeClaim:
            #  claimName: filestore 
        containers:
          - image: localhost:32000/mongo-cst:1.0
            imagePullPolicy: Always
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-duncan
                mountPath: /kickstart/
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - mongo-shard-1
                      - debugger


