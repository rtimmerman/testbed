  type: ClusterIP
---
kind: Pod
apiVersion: v1
metadata:
  name: duncan-configurator-pod
  namespace: dev
spec:
  containers:
    - name: duncan-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-duncan
          mountPath: /kickstart/
        - name: kickstart-shard-duncan
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-duncan
      configMap:
        name: kickstart-duncan
        defaultMode: 0777
    - name: kickstart-shard-duncan
      configMap:
        name: add-shard-duncan
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-4
                - debugger
