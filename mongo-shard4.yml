---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duncan-pri
  labels:
    role: duncan-pri
    purpose: database
  namespace: dev
spec:
  selector:
    matchLabels:
      role: duncan-pri
      purpose: database
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          role: duncan-pri
          purpose: database
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-duncan
          - name: kickstart-duncan
            configMap:
              name: kickstart-duncan
              defaultMode: 0777
          - name: filestore
            hostPath:
              path: /home/roderick/experiment-data
              type: Directory
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-duncan
                mountPath: /kickstart/
              - name: filestore
                mountPath: /filestore/
        nodeSelector:
          kubernetes.io/hostname: mongo-shard-4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: duncan-sec-1
  labels:
    role: duncan-sec-1
    purpose: database
  namespace: dev  
spec:
  selector:
    matchLabels:
      role: duncan-sec-1
      purpose: database
  replicas: 1
