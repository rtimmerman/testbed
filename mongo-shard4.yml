    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27018
            - containerPort: 9091
          command:
            - "/bin/sh"
            - "-c"
            - "/kickstart/app-support-sec-1.sh"
          volumeMounts:
            - name: kickstart-duncan
              mountPath: /kickstart/
            - name: filestore
              mountPath: /filestore/
      volumes:
        - name: kickstart-duncan
          configMap:
            name: kickstart-duncan
            defaultMode: 0777
        - name: filestore
          hostPath:
            path: /home/roderick/experiment-data
            type: Directory
      nodeSelector:
        kubernetes.io/hostname: mongo-shard-4
