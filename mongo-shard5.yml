kind: Pod
apiVersion: v1
metadata:
  name: elliot-configurator-pod
  namespace: dev
spec:
  containers:
    - name: elliot-configurator-container
      image: localhost:32000/mongo-cst:1.0
      imagePullPolicy: Always
      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-elliot
          mountPath: /kickstart/
        - name: kickstart-shard-elliot
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-elliot
      configMap:
        name: kickstart-elliot
        defaultMode: 0777
    - name: kickstart-shard-elliot
      configMap:
        name: add-shard-elliot
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-5
                - debugger
