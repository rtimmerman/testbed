# This file has been generated dynamically using generate-mongo-shard-yml.pl, edit that file and re-run.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-rs-config-elliot
  namespace: dev
data:
  mongo-rs-config-elliot.js: |
    while (true) {
      sleep(3000);
      var result = rs.initiate({
        _id: "elliot.rs",
        members: [
          {_id: 0, host: "elliot-pri:27018", priority: 2},
          {_id: 1, host: "elliot-sec-1:27018", priority: 1},
          {_id: 2, host: "elliot-sec-2:27018", priority: 1}
        ]
      });
      print("**OUTCOME**");
      printjson(result);

      if (result.ok == 1 || [23].includes(result.code)) {
        break;
      }
    }

  mongo-replication-elliot.yml: |
    sharding:
      clusterRole:  shardsvr
    replication:
      replSetName: "elliot.rs"
    security:
      clusterAuthMode: x509
    net:
      bindIp: "*"
      tls:
        mode: requireTLS
        certificateKeyFile: "/kickstart/elliot-pri.pem"
        clusterFile: "/kickstart/config-server.pem"
        clusterCAFile: "/kickstart/root-ca.pem"
        CAFile: "/kickstart/root-ca.pem"
        allowInvalidHostnames: true
        allowInvalidCertificates: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: add-shard-elliot
  namespace: dev
data:
  add-shard-elliot.js: |
    var ok = false;

    while(!ok) {
      sleep(30000);
      var error = sh.addShard(
        "elliot.rs/elliot-pri:27018,elliot-sec-1:27018,elliot-sec-2:27018"
      );

      ok = (error.ok == 1);

      printjson(error);
    }

    print("installing cartToPol fn");

      var out = db.system.js.save({
        _id: 'cartToPol',
        value: function (x, y, width, height) {
            return {
                re: -2 + ((x / width) * 4),
                im: -2 + ((y / height) * 4)
            };
        }
      });

    printjson(out);

    print("installing mandelbrot fn");

    var out = db.system.js.save({
      _id: 'mandelbrot',
      value: function (z, c, iterations) {
          if (iterations == 0) {
              return -1;
          }

          var M = {
              re: ((z.re * z.re) - (z.im * z.im)) + c.re,
              im: (2 * (z.im * z.re)) + c.im
          }

          var M_abs = Math.sqrt((M.re * M.re) + (M.im * M.im));

          if (M_abs > 4.0) {
              return iterations;
          }

          return mandelbrot(M, c, iterations - 1);
      }
    });

    printjson(out);
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kickstart-elliot
  namespace: dev
data:
  app-support-pri.sh: |
    pip3 install psutil
    mkdir -p /filestore/data/elliot-pri
    mongod --bind_ip_all &
    sleep 3
    mongosh --norc /kickstart/add-user.js
    kill -9 $(ps aux | grep mongod | grep bind_ip_all | awk '{print $2}')

    mongod --config /config/mongo-replication-elliot.yml --bind_ip_all --dbpath /filestore/data/elliot-pri &
    for i in {1..60}; do
       sleep 10
       echo 'waiting for elliot-pri:27018 ...'
       if `nc -z elliot-pri 27018`; then
        echo 'setting up mongo rs via elliot-pri ...'
        mongosh --tls --tlsCertificateKeyFile /kickstart/elliot-pri.pem --tlsCAFile /kickstart/root-ca.pem --authenticationDatabase '$external' --authenticationMechanism MONGODB-X509 elliot-pri:27018 /config/mongo-rs-config-elliot.js
        echo 'mongo rs configured!'
        break
      fi 
    done
    #python3 /filestore/monitor.py
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  app-support-sec-1.sh: |
    pip3 install psutil
    mkdir -p /filestore/data/elliot-sec-1
    mongod --clusterAuthMode x509 --tlsMode requireTLS --tlsCertificateKeyFile /kickstart/elliot-sec-1.pem --tlsCAFile /kickstart/root-ca.pem --shardsvr --replSet elliot.rs --bind_ip_all --dbpath /filestore/data/elliot-sec-1 &
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  app-support-sec-2.sh: |
    pip3 install psutil
    mkdir -p /filestore/data/elliot-sec-2
    mongod --clusterAuthMode x509 --tlsMode requireTLS --tlsCertificateKeyFile /kickstart/elliot-sec-2.pem --tlsCAFile /kickstart/root-ca.pem --shardsvr --replSet elliot.rs --bind_ip_all --dbpath /filestore/data/elliot-sec-2 &
    cd $HOME
    tar -zxf /filestore/node_exporter-1.0.1.linux-amd64.tar.gz
    ./node_exporter-1.0.1.linux-amd64/node_exporter --web.listen-address=0.0.0.0:9091
  configurator.sh: |
    for i in {1..60}; do
      sleep 1
      if nc -z mongos-1-svc 27017; then
        echo 'Establishing shards'
        mongosh --tls --tlsCertificateKeyFile /kickstart/mongos-1-svc.pem --tlsCAFile /kickstart/root-ca.pem --authenticationDatabase '$external' --authenticationMechanism MONGODB-X509 mongos-1-svc:27017/admin /kickstart-shard/add-shard-elliot.js
        break
      fi
    done
  
  add-user.js: |
    // wait for mongod to be present...
    var conn;

    while(true) {
      try {
        conn = new Mongo('localhost:27017');
        break;
      } catch (Error) {
        print(Error);
      }
      sleep(100);
    }

    //conn.setReadPref('primary');

    db = conn.getDB('admin').getSiblingDB('$external');

    var outcome = [];
    outcome.push(
        db.runCommand(
        {
          createUser: "CN=elliot-pri,OU=ExperimentClients,O=Roderick,O=BBK,L=Southminster,ST=Essex,C=GB",
          roles: [
            {role: 'userAdminAnyDatabase', db: 'admin'},
            {role: 'readWrite', db: 'test'},
            {role: 'clusterAdmin', db: 'admin'}
          ],
          writeConcern: {
            w: 'majority',
            wtimeout: 5000
          }
        }
      )
    );

    outcome.push(
        db.runCommand(
        {
          createUser: "CN=elliot-sec-1,OU=ExperimentClients,O=Roderick,O=BBK,L=Southminster,ST=Essex,C=GB",
          roles: [
            {role: 'userAdminAnyDatabase', db: 'admin'},
            {role: 'readWrite', db: 'test'},
            {role: 'clusterAdmin', db: 'admin'}
          ],
          writeConcern: {
            w: 'majority',
            wtimeout: 5000
          }
        }
      )
    );

    outcome.push(
        db.runCommand(
        {
          createUser: "CN=elliot-sec-2,OU=ExperimentClients,O=Roderick,O=BBK,L=Southminster,ST=Essex,C=GB",
          roles: [
            {role: 'userAdminAnyDatabase', db: 'admin'},
            {role: 'readWrite', db: 'test'},
            {role: 'clusterAdmin', db: 'admin'}
          ],
          writeConcern: {
            w: 'majority',
            wtimeout: 5000
          }
        }
      )
    );

    outcome.push(
        db.runCommand(
        {
          createUser: "CN=mongos-1-svc,OU=ExperimentServers,O=Roderick,O=BBK,L=Southminster,ST=Essex,C=GB",
          roles: [
            {role: 'userAdminAnyDatabase', db: 'admin'},
            {role: 'readWrite', db: 'test'},
            {role: 'clusterAdmin', db: 'admin'}
          ],
          writeConcern: {
            w: 'majority',
            wtimeout: 5000
          }
        }
      )
    );

    printjson(outcome);
