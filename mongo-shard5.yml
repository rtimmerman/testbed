---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elliot-pri
  labels:
    role: elliot-pri
    purpose: database
  namespace: dev
spec:
  selector:
    matchLabels:
      role: elliot-pri
      purpose: database
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          role: elliot-pri
          purpose: database
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config-elliot
          - name: kickstart-elliot
            configMap:
              name: kickstart-elliot
              defaultMode: 0777
            #persistentVolumeClaim:
            #  claimName: filestore 
        containers:
          - image: localhost:32000/mongo-cst:1.0
            imagePullPolicy: Always
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "/kickstart/app-support-pri.sh"
            ports:
              - containerPort: 27018
              - containerPort: 9091
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: kickstart-elliot
                mountPath: /kickstart/
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - mongo-shard-5
                      - debugger


