      command: ['/bin/sh', '-c','/kickstart/configurator.sh']
      volumeMounts:
        - name: kickstart-elliot
          mountPath: /kickstart/
        - name: kickstart-shard-elliot
          mountPath: /kickstart-shard/
  volumes:
    - name: kickstart-elliot
      configMap:
        name: kickstart-elliot
        defaultMode: 0777
    - name: kickstart-shard-elliot
      configMap:
        name: add-shard-elliot
  restartPolicy: Never
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values:
                - mongo-shard-1
                - debugger
