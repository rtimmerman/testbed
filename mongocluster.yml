      volumes:
        - name: apt-config
          configMap:
            name: apt-config
            defaultMode: 0755
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-cluster-secondary-3
  labels:
    purpose: mongo-cluster-secondary-3
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: mongo-cluster-secondary-3
  replicas: 1
