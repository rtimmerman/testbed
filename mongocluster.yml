---
apiVersion: v1
kind: Service
metadata:
  name: mongo-primary-db
  namespace: dev
spec:
  selector:
    purpose: mongo-cluster-primary
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-secondary-db-1
  namespace: dev
spec:
  selector:
    purpose: mongo-cluster-secondary-1
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
---
