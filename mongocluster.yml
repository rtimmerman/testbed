apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-rs-config
  namespace: dev
data:
  mongo-rs-config.js: |
    var error = rs.initiate({
      _id: "rs0",
      members: [
        {_id: 0, host: "mongo-primary-db:27017"},
        {_id: 1, host: "mongo-secondary-db-1:27017"},
        {_id: 2, host: "mongo-secondary-db-2:27017"},
        {_id: 3, host: "mongo-secondary-db-3:27017"}
      ]
    });
    printjson(error);
  mongo-replication.yml: |
    replication:
      replSetName: "rs0"
    net:
      bindIp: "*"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apt-config
  namespace: dev
data:
  app-support.sh: |
    apt update
    apt install -y netcat python3 python3-pip
    pip3 install psutil
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-cluster-primary
  labels:
    purpose: mongo-cluster-primary
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: mongo-cluster-primary
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
      metadata:
        labels:
          purpose: mongo-cluster-primary
      spec:
        terminationGracePeriodSeconds: 5
        volumes:
          - name: startup-config
            configMap:
              name: mongo-rs-config
          - name: apt-config
            configMap:
              name: apt-config
              defaultMode: 0755
        containers:
          - image: mongo
            name: mongo-db-container
            command:
              - "/bin/sh"
              - "-c"
              - "mongod --config=/config/mongo-replication.yml & /apt-config/app-support.sh; for i in {1..60}; do sleep 1; if nc -z localhost 27017; then echo 'setting up mongo rs'; mongo /config/mongo-rs-config.js; break; fi; done; perl -e 'while(1) { sleep 60; }'"
            ports:
              - containerPort: 27017
            volumeMounts:
              - name: startup-config
                mountPath: /config/
              - name: apt-config
                mountPath: /apt-config/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-cluster-secondary-1
  labels:
    purpose: mongo-cluster-secondary-1
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: mongo-cluster-secondary-1
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        purpose: mongo-cluster-secondary-1
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - image: mongo
          name: mongo-db-container
          ports:
            - containerPort: 27017
          command:
            - "/bin/sh"
            - "-c"
            - "/apt-config/app-support.sh && mongod --replSet rs0 --bind_ip \\*"
          volumeMounts:
            - name: apt-config
              mountPath: /apt-config/
      volumes:
        - name: apt-config
          configMap:
            name: apt-config
            defaultMode: 0755
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-cluster-secondary-2
  labels:
    purpose: mongo-cluster-secondary-2
  namespace: dev
spec:
  selector:
    matchLabels:
      purpose: mongo-cluster-secondary-2
